document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c-if value=\"{{ m.isMenu }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"align-self:flex-start;background:#FFFFFF;border-radius:12px 12px 12px 4px;padding:9px 13px;max-width:88%;font-size:12px;line-height:1.5;box-shadow:0 1px 1px rgba(0,0,0,.08);animation:msgIn .3s ease-out\">\n                    <strong>Olá, Vereador(a) 👋<\u002Fstrong><br>Sou seu Assessor de Comunicação 24h. Como posso te ajudar hoje?<br><br>\n                    1️⃣ Transformar áudio em comunicação<br>2️⃣ Transformar texto em comunicação<br>3️⃣ Criar um Requerimento<br>4️⃣ Criar um Projeto de Lei<br>5️⃣ Transformar Projeto de Lei em matéria jornalística<br>6️⃣ Ajuda para formular discurso<br>7️⃣ Gerar matérias do meu discurso na tribuna\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ m.isAudio }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"align-self:flex-end;background:#DCF8C6;border-radius:12px 12px 4px 12px;padding:10px 13px;max-width:75%;box-shadow:0 1px 1px rgba(0,0,0,.08);animation:msgIn .3s ease-out;display:flex;align-items:center;gap:10px\">\n                    <div style=\"width:30px;height:30px;border-radius:50%;background:#075E54;display:flex;align-items:center;justify-content:center;color:#FFFFFF;font-size:13px;flex:none\">🎙<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:2.5px;height:20px\">\n                      <div style=\"width:3px;height:8px;background:#7C8B80;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:14px;background:#7C8B80;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:18px;background:#075E54;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:10px;background:#7C8B80;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:16px;background:#075E54;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:7px;background:#7C8B80;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:12px;background:#7C8B80;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:17px;background:#075E54;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:9px;background:#7C8B80;border-radius:2px\"><\u002Fdiv><div style=\"width:3px;height:13px;background:#7C8B80;border-radius:2px\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#7C8B80\">0:47<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ m.isDoc }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"align-self:flex-start;background:#FFFFFF;border-radius:12px;padding:12px;max-width:88%;box-shadow:0 1px 1px rgba(0,0,0,.08);animation:msgIn .3s ease-out\">\n                    <div style=\"background:#F4F6F9;border:1px solid #E2E7F0;border-radius:10px;padding:12px 14px\">\n                      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\">\n                        <div style=\"width:32px;height:32px;border-radius:8px;background:#246BFD;display:flex;align-items:center;justify-content:center;color:#FFFFFF;font-size:14px;flex:none\">📋<\u002Fdiv>\n                        <div>\n                          <div style=\"font-weight:700;font-size:12.5px;color:#101D3A\">Requerimento — Iluminação Pública<\u002Fdiv>\n                          <div style=\"font-size:10.5px;color:#8A93A6\">Pronto para revisão do gabinete<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:5px\">\n                        <div style=\"height:6px;border-radius:3px;background:#DDE3EE;width:100%\"><\u002Fdiv>\n                        <div style=\"height:6px;border-radius:3px;background:#DDE3EE;width:92%\"><\u002Fdiv>\n                        <div style=\"height:6px;border-radius:3px;background:#DDE3EE;width:96%\"><\u002Fdiv>\n                        <div style=\"height:6px;border-radius:3px;background:#DDE3EE;width:60%\"><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12.5px;line-height:1.45;margin-top:9px;color:#2C3445\">Aqui está o requerimento estruturado ✅ Revise com sua equipe antes do protocolo.<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"align-self:flex-start;background:#FFFFFF;border-radius:12px 12px 12px 4px;padding:12px 16px;box-shadow:0 1px 1px rgba(0,0,0,.08);display:flex;gap:5px;animation:msgIn .25s ease-out\">\n                <div style=\"width:7px;height:7px;border-radius:50%;background:#8A93A6;animation:dotPulse 1.1s infinite\"><\u002Fdiv>\n                <div style=\"width:7px;height:7px;border-radius:50%;background:#8A93A6;animation:dotPulse 1.1s .18s infinite\"><\u002Fdiv>\n                <div style=\"width:7px;height:7px;border-radius:50%;background:#8A93A6;animation:dotPulse 1.1s .36s infinite\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1 1 460px;min-width:300px\">\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;color:#246BFD;margin-bottom:16px\">VEJA FUNCIONANDO<\u002Fdiv>\n      <h2 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(28px,3.4vw,42px);line-height:1.18;color:#101D3A;margin:0 0 20px;text-wrap:pretty\">Da mensagem ao documento. Da ideia à comunicação. <span style=\"color:#246BFD\">Tudo em uma única conversa.<\u002Fspan><\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;color:#5A6478;margin:0 0 32px;text-wrap:pretty\">Ao lado, um fluxo real: o vereador pede um requerimento, envia um áudio com a demanda e recebe o documento estruturado — pronto para a revisão da equipe.<\u002Fp>\n      <a href=\"{{ waLink }}\" target=\"_blank\" style=\"display:inline-block;background:#246BFD;color:#FFFFFF;font-weight:800;font-size:15px;letter-spacing:.03em;padding:17px 30px;border-radius:10px;box-shadow:0 10px 28px rgba(36,107,253,.28)\" style-hover=\"background:#1A54D6;color:#FFFFFF\">QUERO VER FUNCIONANDO NO MEU WHATSAPP<\u002Fa>\n      <p style=\"font-size:13.5px;color:#8A93A6;margin:14px 0 0\">7 dias grátis. Demonstração rápida e sem compromisso.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PROBLEMA ===================== -->\n<section data-screen-label=\"Problema\" style=\"background:#FFFFFF;padding:96px 24px\">\n  <div style=\"max-width:1080px;margin:0 auto\">\n    <div style=\"max-width:760px;margin:0 auto 56px;text-align:center\">\n      <h2 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(28px,3.4vw,42px);line-height:1.18;color:#101D3A;margin:0 0 18px;text-wrap:pretty\">Seu mandato tem boas ações. O problema é conseguir comunicar tudo.<\u002Fh2>\n      <p style=\"font-size:16.5px;line-height:1.65;color:#5A6478;margin:0;text-wrap:pretty\">A rotina de um gabinete é intensa. Todos os dias surgem reuniões, visitas, discursos, demandas da população, requerimentos, projetos e decisões que precisam ser comunicadas. Mas nem sempre existe tempo ou equipe suficiente para transformar tudo isso em conteúdo profissional.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px\">\n      <sc-for list=\"{{ pains }}\" as=\"p\" hint-placeholder-count=\"5\">\n        <div style=\"background:#F4F6F9;border-radius:16px;padding:28px 26px\">\n          <div style=\"width:42px;height:42px;border-radius:12px;background:#101D3A;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:18px\">{{ p.icon }}<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:17.5px;color:#101D3A;margin-bottom:9px;text-wrap:pretty\">{{ p.title }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.6;color:#5A6478;text-wrap:pretty\">{{ p.text }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(19px,2.2vw,24px);color:#101D3A;margin:56px auto 0;max-width:680px;text-align:center;text-wrap:pretty\">Não basta trabalhar. <span style=\"color:#34C17D\">A população precisa compreender o que está sendo feito.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== SOLUÇÃO ===================== -->\n<section data-screen-label=\"Solução\" style=\"background:#101D3A;padding:96px 24px;color:#FFFFFF\">\n  <div style=\"max-width:1080px;margin:0 auto;text-align:center\">\n    <h2 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(28px,3.4vw,42px);line-height:1.18;margin:0 0 18px;text-wrap:pretty\">Um assessor preparado para ajudar seu mandato <span style=\"color:#34C17D\">24 horas por dia.<\u002Fspan><\u002Fh2>\n    <p style=\"font-size:16.5px;line-height:1.65;color:rgba(255,255,255,.72);max-width:720px;margin:0 auto 20px;text-wrap:pretty\">O Assessor 24h reúne comunicação política e produção legislativa em uma única plataforma. O vereador ou assessor envia uma mensagem, um texto, uma ideia, um documento ou um áudio. O sistema organiza as informações e entrega materiais estruturados para revisão e utilização pelo gabinete.<\u002Fp>\n    <p style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(19px,2.4vw,26px);color:#FFFFFF;margin:0 0 56px\">Você envia a ideia. <span style=\"color:#246BFD\">O Assessor 24h transforma em resultado.<\u002Fspan><\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;text-align:left\">\n      <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:30px 26px\">\n        <div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:13px;color:#34C17D;letter-spacing:.12em;margin-bottom:14px\">1 — ENVIE<\u002Fdiv>\n        <div style=\"font-size:15.5px;line-height:1.6;color:rgba(255,255,255,.82)\">Áudio, texto, projeto, ideia, demanda ou discurso.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:30px 26px\">\n        <div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:13px;color:#34C17D;letter-spacing:.12em;margin-bottom:14px\">2 — O ASSESSOR 24H ORGANIZA<\u002Fdiv>\n        <div style=\"font-size:15.5px;line-height:1.6;color:rgba(255,255,255,.82)\">A plataforma interpreta o contexto, estrutura o conteúdo e adapta a linguagem.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:30px 26px\">\n        <div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:13px;color:#34C17D;letter-spacing:.12em;margin-bottom:14px\">3 — RECEBA<\u002Fdiv>\n        <div style=\"font-size:15.5px;line-height:1.6;color:rgba(255,255,255,.82)\">Matéria, discurso, requerimento, projeto de lei, headline, legenda ou conteúdo para divulgação.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 7 FUNÇÕES INTERATIVAS ===================== -->\n<section id=\"recursos\" data-screen-label=\"Recursos — 7 funções\" style=\"background:#F4F6F9;padding:96px 24px;scroll-margin-top:70px\">\n  <div style=\"max-width:1120px;margin:0 auto\">\n    <div style=\"text-align:center;max-width:720px;margin:0 auto 48px\">\n      <h2 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(28px,3.4vw,42px);line-height:1.18;color:#101D3A;margin:0 0 16px;text-wrap:pretty\">Escolha uma função e veja o que acontece.<\u002Fh2>\n      <p style=\"font-size:16.5px;line-height:1.6;color:#5A6478;margin:0\">As sete funções abaixo são as respostas reais que o vereador recebe no WhatsApp. Toque em uma delas.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:36px\">\n      <sc-for list=\"{{ fnTabs }}\" as=\"f\" hint-placeholder-count=\"7\">\n        <button sc-camel-on-click=\"{{ f.select }}\" style=\"display:flex;align-items:center;gap:9px;background:{{ f.bg }};color:{{ f.fg }};border:1.5px solid {{ f.border }};border-radius:999px;padding:11px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13.5px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#246BFD\">\n          <span style=\"display:inline-flex;width:22px;height:22px;border-radius:50%;background:{{ f.numBg }};color:{{ f.numFg }};align-items:center;justify-content:center;font-size:11.5px;font-weight:800;flex:none\">{{ f.num }}<\u002Fspan>\n          {{ f.short }}\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"background:#FFFFFF;border-radius:20px;box-shadow:0 8px 40px rgba(16,29,58,.08);padding:clamp(26px,4vw,48px);display:flex;flex-wrap:wrap;gap:40px\">\n      <div style=\"flex:1 1 380px;min-width:280px\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;color:#34C17D;margin-bottom:12px\">OPÇÃO {{ selFn.num }}<\u002Fdiv>\n        <h3 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(21px,2.4vw,28px);color:#101D3A;margin:0 0 16px;line-height:1.2;text-wrap:pretty\">{{ selFn.title }}<\u002Fh3>\n        <p style=\"font-size:15.5px;line-height:1.65;color:#5A6478;margin:0 0 22px;text-wrap:pretty\">{{ selFn.text }}<\u002Fp>\n        <sc-if value=\"{{ selFn.hasDeliveries }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size:12.5px;font-weight:700;letter-spacing:.1em;color:#101D3A;margin-bottom:10px\">{{ selFn.deliveriesLabel }}<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px\">\n            <sc-for list=\"{{ selFn.deliveries }}\" as=\"d\" hint-placeholder-count=\"4\">\n              <span style=\"background:#F4F6F9;border:1px solid #E2E7F0;color:#2C3445;font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px\">{{ d }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <p style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:17.5px;color:#246BFD;margin:0;text-wrap:pretty\">{{ selFn.impact }}<\u002Fp>\n        <sc-if value=\"{{ selFn.hasWarning }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:22px;background:#F0F4FA;border:1px solid #C9D6EE;border-radius:12px;padding:14px 16px;font-size:13.5px;line-height:1.55;color:#3D5378\">⚠️ {{ selFn.warning }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 320px;min-width:280px;display:flex;flex-direction:column;justify-content:center\">\n        <div style=\"background:#ECE5DD;border-radius:18px;padding:20px 16px\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;color:#8A93A6;margin-bottom:12px;text-align:center\">RESPOSTA REAL DO SISTEMA<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <div style=\"align-self:flex-end;background:#DCF8C6;border-radius:12px 12px 4px 12px;padding:8px 13px;font-size:14px;box-shadow:0 1px 1px rgba(0,0,0,.08)\">{{ selFn.num }}<\u002Fdiv>\n            <div style=\"align-self:flex-start;background:#FFFFFF;border-radius:12px 12px 12px 4px;padding:11px 14px;max-width:95%;font-size:13.8px;line-height:1.55;box-shadow:0 1px 1px rgba(0,0,0,.08)\">{{ selFn.msg }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:center;margin-top:48px\">\n      <p style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(18px,2vw,22px);color:#101D3A;margin:0 0 20px;text-wrap:pretty\">Qual dessas funções  &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;WhatsApp&quot;},\n  &quot;velocidadeAnimacao&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.5, &quot;max&quot;: 2, &quot;step&quot;: 0.25, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Animação&quot;, &quot;description&quot;: &quot;Velocidade da conversa animada&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    visCount: 0, typing: false, paused: false,\n    selIdx: 2, openFaq: -1, menuOpen: false, winW: 1200, animVisible: false\n  };\n\n  scenes = [\n    { who: 'user', kind: 'text', text: 'Bom dia' },\n    { who: 'bot', kind: 'menu' },\n    { who: 'user', kind: 'text', text: '3' },\n    { who: 'bot', kind: 'text', text: 'Certo! Me envie um áudio ou texto descrevendo o que você quer requerer e para qual secretaria ou órgão. Eu monto o requerimento formal. 📋' },\n    { who: 'user', kind: 'audio' },\n    { who: 'bot', kind: 'text', text: 'Recebi as informações. Estou estruturando o requerimento com o pedido, a justificativa e o órgão responsável.' },\n    { who: 'bot', kind: 'doc' }\n  ];\n\n  fns = [\n    { num: '1', short: 'Áudio em comunicação', title: 'Transformar áudio em comunicação',\n      msg: 'Perfeito! Agora é só gravar um áudio me contando com detalhes o assunto. Fale à vontade — quanto mais detalhes, melhor o resultado. 🎙️',\n      text: 'O vereador fala naturalmente e o sistema organiza as informações em uma comunicação profissional.',\n      deliveriesLabel: 'POSSÍVEIS ENTREGAS',\n      deliveries: ['Matéria jornalística', 'Release', 'Legenda para redes sociais', 'Texto institucional', 'Sugestão de título', 'Roteiro para vídeo'],\n      impact: 'O vereador fala. O Assessor 24h transforma em comunicação.', warning: null },\n    { num: '2', short: 'Texto em comunicação', title: 'Transformar texto em comunicação',\n      msg: 'Ótimo! Me envie o texto que você quer transformar em comunicação. Pode ser um rascunho, anotação ou ideia solta — eu organizo tudo. ✍️',\n      text: 'Não é necessário escrever perfeitamente. O sistema transforma rascunhos, anotações e ideias soltas em materiais claros, organizados e profissionais.',\n      deliveriesLabel: '', deliveries: [],\n      impact: 'Sua ideia não precisa estar pronta. Ela só precisa ser enviada.', warning: null },\n    { num: '3', short: 'Criar requerimento', title: 'Criar um Requerimento',\n      msg: 'Certo! Me envie um áudio ou texto descrevendo o que você quer requerer e para qual secretaria ou órgão. Eu monto o requerimento formal. 📋',\n      text: 'O vereador descreve a demanda e o Assessor 24h ajuda a organizar o pedido, a justificativa e o direcionamento ao órgão competente.',\n      deliveriesLabel: '', deliveries: [],\n      impact: 'Uma demanda da população pode se transformar em ação legislativa.',\n      warning: 'Todo requerimento deve passar pela revisão e validação da equipe responsável antes do protocolo.' },\n    { num: '4', short: 'Criar projeto de lei', title: 'Criar um Projeto de Lei',\n      msg: 'Entendido! Me descreva em áudio ou texto a ideia do projeto de lei — tema, objetivo e quem ele beneficia. Eu estruturo o projeto completo. 🗂️',\n      text: 'O sistema ajuda a estruturar a ideia, organizar o objetivo, desenvolver a justificativa e apresentar uma proposta inicial para análise do gabinete.',\n      deliveriesLabel: '', deliveries: [],\n      impact: 'Boas ideias não podem depender de tempo livre para saírem do papel.',\n      warning: 'Todo projeto deve ser analisado pela assessoria jurídica e legislativa antes da apresentação ou protocolo.' },\n    { num: '5', short: 'Projeto em matéria', title: 'Transformar Projeto de Lei em matéria jornalística',\n      msg: 'Perfeito! Me envie o PDF do projeto de lei e eu transformo em uma matéria jornalística completa. 📄',\n      text: 'O Assessor 24h traduz a linguagem legislativa para uma comunicação simples, clara e compreensível para a população.',\n      deliveriesLabel: 'POSSÍVEIS ENTREGAS',\n      deliveries: ['Matéria jornalística', 'Resumo do projeto', 'Sugestão de manchete', 'Legenda para redes sociais', 'Principais benefícios', 'Explicação acessível'],\n      impact: 'A população precisa entender o projeto para reconhecer sua importância.', warning: null },\n    { num: '6', short: 'Formular discurso', title: 'Ajuda para formular discurso',\n      msg: 'Boa! Me conte em áudio ou texto o contexto: qual o evento ou reunião, quem é o público e qual a pauta em discussão. Eu monto a estrutura do seu discurso com argumentos, exemplos locais e propostas. 🎤',\n      text: 'O vereador informa a ocasião, o público e o tema. O Assessor 24h ajuda a organizar a abertura, os argumentos, os exemplos e a mensagem principal.',\n      deliveriesLabel: 'POSSÍVEIS APLICAÇÕES',\n      deliveries: ['Discursos na tribuna', 'Reuniões comunitárias', 'Entrevistas', 'Eventos', 'Audiências públicas', 'Encontros partidários', 'Pronunciamentos', 'Reuniões com entidades'],\n      impact: 'Fale com clareza, propósito e argumentos organizados.', warning: null },\n    { num: '7', short: 'Matéria do discurso', title: 'Gerar matéria do discurso na tribuna',\n      msg: 'Show! Quando subir à tribuna, grave seu discurso pelo WhatsApp. Segure o microfone ou use o cadeado para gravar sem precisar manter o botão pressionado. Ao terminar, envie o áudio completo aqui. Áudios com mais de quatro minutos são reconhecidos automaticamente como discurso, e você recebe a matéria jornalística pronta, uma headline e uma legenda para o Instagram. 🎙️📰',\n      text: 'O discurso não termina quando o vereador deixa a tribuna. O conteúdo pode se transformar imediatamente em comunicação para imprensa, site e redes sociais.',\n      deliveriesLabel: 'ENTREGAS',\n      deliveries: ['Matéria jornalística', 'Headline', 'Legenda para Instagram', 'Resumo da fala', 'Principais declarações', 'Sugestão de chamada'],\n      impact: 'Saiu da tribuna. A matéria já pode estar pronta.', warning: null }\n  ];\n\n  faqData = [\n    { q: '\"Eu não entendo de tecnologia.\"', a: 'Você não precisa entender. O Assessor 24h foi criado para ser simples. Você conversa com o sistema como já faz todos os dias pelo WhatsApp.' },\n    { q: '\"Minha equipe já produz conteúdo.\"', a: 'O Assessor 24h não precisa substituir sua equipe. Ele aumenta a capacidade dos assessores, reduz tarefas repetitivas e ajuda o gabinete a produzir com mais rapidez.' },\n    { q: '\"O conteúdo ficará genérico?\"', a: 'O sistema pode trabalhar com o contexto, a linguagem, as bandeiras, os projetos e o posicionamento do mandato. Quanto mais informações recebe, mais alinhadas ficam as entregas.' },\n    { q: '\"Posso publicar tudo automaticamente?\"', a: 'O Assessor 24h entrega materiais estruturados, mas toda comunicação pública e produção legislativa deve ser revisada e aprovada pela equipe responsável.' },\n    { q: '\"Isso substitui advogado ou assessor legislativo?\"', a: 'Não. O sistema apoia a construção, organização e estruturação dos materiais. A validação jurídica, legislativa e política continua sob responsabilidade dos profissionais do gabinete.' },\n    { q: '\"Funciona apenas durante o horário comercial?\"', a: 'Não. O Assessor 24h está disponível para auxiliar o mandato 24 horas por dia.' },\n    { q: '\"Preciso baixar um novo aplicativo?\"', a: 'Não. O vereador utiliza o WhatsApp, ferramenta que já faz parte de sua rotina.' },\n    { q: '\"É difícil aprender?\"', a: 'Não. O próprio sistema apresenta o menu e orienta o vereador em cada etapa.' }\n  ];\n\n  componentDidMount() {\n    this._onResize = () => this.setState({ winW: window.innerWidth });\n    this._onResize();\n    window.addEventListener('resize', this._onResize);\n    this._chatEl = null;\n    this._timer = null;\n    this._observed = false;\n    this._tryObserve();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n    clearTimeout(this._timer);\n    if (this._io) this._io.disconnect();\n  }\n\n  _tryObserve() {\n    if (this._observed) return;\n    const el = this._chatEl;\n    if (!el) { setTimeout(() => this._tryObserve(), 300); return; }\n    this._observed = true;\n    this._io = new IntersectionObserver((entries) => {\n      const vis = entries[0].isIntersecting;\n      this._visible = vis;\n      this.setState({ animVisible: vis });\n      if (vis && !this._running) this._startLoop();\n    }, { threshold: 0.25 });\n    this._io.observe(el);\n  }\n\n  _speed() { return 1 / (this.props.velocidadeAnimacao ?? 1); }\n\n  _startLoop() {\n    this._running = true;\n    this._step();\n  }\n\n  _wait(ms, fn) {\n    clearTimeout(this._timer);\n    this._timer = setTimeout(fn, ms * this._speed());\n  }\n\n  _step() {\n    if (!this._visible) { this._running = false; return; }\n    if (this.state.paused) { this._wait(500, () => this._step()); return; }\n    const i = this.state.visCount;\n    if (i >= this.scenes.length) {\n      this._wait(4500, () => { this.setState({ visCount: 0, typing: false }); this._wait(600, () => this._step()); });\n      return;\n    }\n    const scene = this.scenes[i];\n    if (scene.who === 'bot') {\n      this.setState({ typing: true });\n      const readMs = scene.kind === 'menu' ? 1600 : 1100;\n      this._wait(readMs, () => {\n        if (this.state.paused) { this.setState({ typing: false }); this._wait(500, () => this._step()); return; }\n        this.setState({ typing: false, visCount: i + 1 });\n        this._wait(scene.kind === 'menu' ? 2600 : 1800, () => this._step());\n      });\n    } else {\n      this.setState({ visCount: i + 1 });\n      this._wait(1300, () => this._step());\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const num = (this.props.numeroWhatsapp ?? '5547999459031').replace(/\\D/g, '');\n    const msg = this.props.mensagemWhatsapp ?? 'Olá! Sou vereador ou faço parte de um gabinete e gostaria de conhecer o Assessor 24h.';\n    const waLink = 'https://wa.me/' + num + '?text=' + encodeURIComponent(msg);\n    const isMobile = s.winW < 920;\n\n    const animMessages = this.scenes.slice(0, s.visCount).map((m, i) => ({\n      key: i,\n      isUserText: m.who === 'user' && m.kind === 'text',\n      isBotText: m.who === 'bot' && m.kind === 'text',\n      isMenu: m.kind === 'menu',\n      isAudio: m.kind === 'audio',\n      isDoc: m.kind === 'doc',\n      text: m.text || ''\n    }));\n\n    const fnTabs = this.fns.map((f, i) => {\n      const active = i === s.selIdx;\n      return {\n        num: f.num, short: f.short,\n        bg: active ? '#101D3A' : '#FFFFFF',\n        fg: active ? '#FFFFFF' : '#2C3445',\n        border: active ? '#101D3A' : '#E2E7F0',\n        numBg: active ? '#34C17D' : '#EFF4FF',\n        numFg: active ? '#101D3A' : '#246BFD',\n        select: () => this.setState({ selIdx: i })\n      };\n    });\n    const f = this.fns[s.selIdx];\n    const selFn = { ...f, hasDeliveries: f.deliveries.length > 0, hasWarning: !!f.warning, warning: f.warning || '' };\n\n    const faqs = this.faqData.map((q, i) => ({\n      ...q,\n      open: s.openFaq === i,\n      mark: s.openFaq === i ? '−' : '+',\n      border: s.openFaq === i ? '#246BFD' : '#E2E7F0',\n      toggle: () => this.setState({ openFaq: s.openFaq === i ? -1 : i })\n    }));\n\n    return {\n      waLink,\n      isMobile, isDesktop: !isMobile,\n      menuOpen: isMobile && s.menuOpen,\n      toggleMenu: () => this.setState({ menuOpen: !s.menuOpen }),\n      closeMenu: () => this.setState({ menuOpen: false }),\n\n      chatRef: (el) => { this._chatEl = el; },\n      animMessages,\n      typing: s.typing,\n      togglePause: () => this.setState({ paused: !s.paused }),\n      pauseLabel: s.paused ? '▶ Retomar' : '❚❚ Pausar',\n\n      hookQuestions: [\n        'Você trabalha o dia inteiro e ninguém vê?',\n        'Seu gabinete não tem equipe de comunicação?',\n        'Precisa responder rápido a demandas da população?',\n        'Quer transformar suas ações em autoridade política?',\n        'Não consegue mostrar tudo que faz nas ruas?',\n        'Precisa estar presente digitalmente sem depender de equipe?'\n      ],\n\n      steps: [\n        { num: '01', title: 'Envie uma mensagem', text: 'Diga \"Oi\", \"Bom dia\" ou explique diretamente o que precisa.' },\n        { num: '02', title: 'Escolha uma opção', text: 'Selecione o serviço desejado no menu.' },\n        { num: '03', title: 'Envie as informações', text: 'Grave um áudio, envie um texto ou anexe um documento.' },\n        { num: '04', title: 'Receba o material', text: 'O Assessor 24h organiza as informações e devolve o conteúdo para revisão.' }\n      ],\n\n      pains: [\n        { icon: '🔇', title: 'Boas ações que ninguém fica sabendo', text: 'O vereador trabalha, mas muitas entregas não se transformam em comunicação.' },\n        { icon: '📥', title: 'Equipe sobrecarregada', text: 'Assessores acumulam atendimento, agenda, produção legislativa, demandas da população e redes sociais.' },\n        { icon: '📝', title: 'Ideias que não saem do papel', text: 'Uma boa proposta pode se perder por falta de tempo para organizar, escrever e apresentar.' },\n        { icon: '⏱️', title: 'Comunicação improvisada', text: 'Textos produzidos com pressa prejudicam a clareza, a imagem e o posicionamento do mandato.' },\n        { icon: '🎤', title: 'Discursos que se perdem', text: 'O vereador sobe à tribuna, apresenta um posicionamento importante e o conteúdo não se transforma em matéria ou publicação.' },\n        { icon: '📉', title: 'Trabalho que não vira autoridade', text: 'Sem comunicação constante, o esforço do mandato não se converte em reconhecimento e presença junto à população.' }\n      ],\n\n      transforms: [\n        { icon: '🎙️', title: 'Áudio', text: 'Transforma fala em conteúdo.' },\n        { icon: '✍️', title: 'Texto', text: 'Transforma rascunho em comunicação.' },\n        { icon: '💡', title: 'Ideia', text: 'Transforma proposta em estrutura legislativa.' },\n        { icon: '🗂️', title: 'Projeto', text: 'Transforma linguagem técnica em matéria.' },\n        { icon: '🎤', title: 'Discurso', text: 'Transforma tribuna em notícia.' }\n      ],\n\n      examples: [\n        { tag: 'EXEMPLO 1 — DEMANDA DA POPULAÇÃO', isAudio: false, hasUserText: true,\n          user: '\"Recebi reclamações sobre a falta de iluminação em uma rua. Quero fazer um requerimento.\"',\n          bot: '\"Certo! Me informe o nome da rua, o bairro, os principais problemas relatados e para qual órgão o pedido deve ser direcionado.\"',\n          results: ['Requerimento estruturado', 'Justificativa', 'Texto de divulgação'],\n          call: 'Da reclamação à ação legislativa.' },\n        { tag: 'EXEMPLO 2 — VISITA A UMA UNIDADE PÚBLICA', isAudio: false, hasUserText: true,\n          user: '\"Visitei uma unidade de saúde e gravei este áudio com os principais problemas.\"',\n          bot: '\"Recebi o áudio. Posso transformar as informações em matéria jornalística, legenda para redes sociais e requerimento ao órgão responsável.\"',\n          results: ['Matéria', 'Legenda', 'Requerimento'],\n          call: 'Uma única mensagem pode gerar várias entregas para o mandato.' },\n        { tag: 'EXEMPLO 3 — DISCURSO NA TRIBUNA', isAudio: true, hasUserText: false,\n          user: '',\n          bot: '\"Discurso recebido. Preparei a matéria jornalística, uma headline e uma legenda para publicação.\"',\n          results: ['Matéria pronta', 'Título', 'Legenda'],\n          call: 'O conteúdo da tribuna continua trabalhando pelo mandato.' }\n      ],\n\n      benefits: [\n        { num: '01', title: 'Mais produtividade', text: 'A equipe reduz o tempo gasto em tarefas repetitivas e consegue focar em decisões estratégicas.' },\n        { num: '02', title: 'Mais velocidade', text: 'Demandas urgentes podem ser organizadas e transformadas em materiais em poucos minutos.' },\n        { num: '03', title: 'Mais presença', text: 'O mandato passa a comunicar com maior frequência, clareza e profissionalismo.' },\n        { num: '04', title: 'Mais organização', text: 'Ideias, discursos, demandas e projetos deixam de ficar espalhados em mensagens e anotações.' },\n        { num: '05', title: 'Mais valorização das ações', text: 'O trabalho realizado pelo vereador se transforma em comunicação compreensível para a população.' },\n        { num: '06', title: 'Mais capacidade para o gabinete', text: 'O sistema amplia a força de produção da equipe sem exigir a contratação imediata de um novo profissional.' },\n      ],\n\n      audiences: [\n        'Vereadores que desejam fortalecer sua comunicação',\n        'Gabinetes com equipes pequenas',\n        'Assessores que precisam produzir mais em menos tempo',\n        'Mandatos que querem profissionalizar seus conteúdos',\n        'Vereadores que precisam organizar ideias e propostas',\n        'Equipes que desejam responder mais rápido às demandas',\n        'Mandatos que querem mostrar melhor o trabalho realizado',\n        'Presidentes de Câmara que desejam oferecer mais estrutura aos gabinetes'\n      ],\n\n      faqs,\n      fnTabs, selFn,\n\n      before: [\n        'Ideias espalhadas em áudios e mensagens',\n        'Demora para produzir materiais',\n        'Dificuldade para manter frequência',\n        'Equipe sobrecarregada',\n        'Ações sem divulgação adequada',\n        'Textos feitos com pressa',\n        'Discursos que não viram conteúdo',\n        'Projetos difíceis de explicar para a população'\n      ],\n      after: [\n        'Ideias transformadas em materiais',\n        'Mais velocidade na produção',\n        'Comunicação mais frequente',\n        'Equipe com apoio permanente',\n        'Ações valorizadas',\n        'Textos mais organizados',\n        'Discursos transformados em notícias',\n        'Projetos explicados em linguagem acessível'\n      ],\n\n      valuePhrases: [\n        'Mais produção. Menos improviso.',\n        'Mais comunicação. Menos oportunidades perdidas.',\n        'Mais estratégia. Menos tarefas repetitivas.',\n        'Mais presença. Mais percepção de trabalho.',\n        'Mais agilidade. Mais capacidade de resposta.'\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
